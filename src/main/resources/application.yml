spring:
  application:
    name: expense-tracker-api

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    
     
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: "health"
  endpoint:
     health:
       show-details: always
       
jwt:
   secret: ${JWT_SECRET:dGhpcy1pcy1hLXRlc3Qtc2VjcmV0LWtleS10aGF0LWlzLWF0LWxlYXN0LTY0LWNoYXJhY3RlcnMtbG9uZw==}
   expiration: ${JWT_EXPIRATION:86400000}
